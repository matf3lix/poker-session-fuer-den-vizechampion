<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleine Poker-Session für den Vizechampion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h2 {
            color: #333;
            white-space: pre-wrap;
        }
        #puzzle-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* Neues CSS für die finale Nachricht */
        #final-message {
            display: none;
            font-size: 20px;
            color: #28a745; /* Ein schönes Erfolgs-Grün */
            font-weight: bold;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h2 id="level-title">Ein kleines Rätsel für den Vizechampion...</h2>
        <img id="puzzle-image" src="" alt="Bild">
        
        <div class="button-container" id="buttons">
            <button onclick="checkAnswer('A')">links</button>
            <button onclick="checkAnswer('B')">rechts</button>
        </div>

        <div id="final-message"></div>
    </div>

    <script>
        // Bilder + richtige Antworten
        const levels = [
            { img: "img/poker01.jpeg", answer: "B" },
            { img: "img/poker02.jpeg", answer: "B" },
            { img: "img/poker03.jpeg", answer: "A" },
            { img: "img/poker04.jpeg", answer: "A" },
            { img: "img/poker05.jpeg", answer: "A" },
            { img: "img/poker06.jpeg", answer: "B" },
            { img: "img/poker07.jpeg", answer: "B" },
            { img: "img/poker08.jpeg", answer: "B" },
            { img: "img/poker09.jpeg", answer: "B" },
            { img: "img/poker10.jpeg", answer: "B" },
            { img: "img/poker10.jpeg", answer: "A" }
        ];

        // Text nach Ende
        const finalMessage = "Der nächste Ort, an dem du suchen solltest, ist unter deinem Schreibtisch.\n\nHappy Birthday!"; 

        let currentLevel = 0;

        // UI aktualisieren
        function updateUI() {
            document.getElementById('puzzle-image').src = levels[currentLevel].img;
            // Spezialfall letzte Runde (index: rundenzahl - 1)
            let message = (currentLevel === 10)
                ? `Eine kurze Poker-Session<br>für den Vizechampion<br><br>Runde ${currentLevel + 1} von 11:<br><span style="color: green;">WER IST THOMAS?</span>`
                : `Eine kurze Poker-Session<br>für den Vizechampion<br><br>Runde ${currentLevel + 1} von 11:<br>Wer gewinnt?`;
            document.getElementById('level-title').innerHTML = message;
        }

        // Antwort prüfen
        function checkAnswer(guess) {
            if (guess === levels[currentLevel].answer) {
                // Spezialfall letzte Runde (index: rundenzahl - 1)
                if (currentLevel === 10) {
                    alert("Happy Birthday! Du hast dir den Titel 'Vizechampion' verdient!");
                    
                    // Spiel-Elemente ausblenden
                    document.getElementById('puzzle-image').style.display = 'none';
                    document.getElementById('buttons').style.display = 'none';
                    
                    // Finales Textelement einblnden
                    document.getElementById('level-title').innerText = "Rätsel gelöst! Damit ist der Vizechampion gut vorbereitet für seinen nächsten Titel!";
                    const messageElement = document.getElementById('final-message');
                    messageElement.innerText = finalMessage;
                    messageElement.style.display = 'block';
                } else {
                    // Nächste Runde
                    currentLevel++;
                    updateUI();
                }
            } else {
                // Falsche Antwort
                alert("Leider falsch, Thomas! So wird das nix mit dem nächsten Titel...");
                currentLevel = 0;
                updateUI();
            }
        }

        // UI beim ersten Laden der Seite initialisieren
        updateUI();
    </script>

</body>
</html>
